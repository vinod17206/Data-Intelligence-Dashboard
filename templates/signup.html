<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="center">
    <div class="glass form-box">

        <h2>📝 Create Account</h2>

        <form method="POST">

            <input 
                type="text" 
                name="name" 
                placeholder="Enter Name" 
                required
            >

            <input 
                type="email" 
                name="email" 
                placeholder="Enter Email" 
                required
            >

            <input 
                type="text" 
                name="phone" 
                placeholder="Enter Phone Number" 
                required
            >

            <input 
                type="password" 
                name="password" 
                placeholder="Create Password" 
                required
            >

            <button type="submit">Signup</button>

        </form>

        <p style="margin-top:10px;">
            Already have an account? 
            <a href="/login" style="color:#00c6ff;">Login</a>
        </p>

    </div>
</div>

</body>
</html>
